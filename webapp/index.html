<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MLS Season Model — Predictions & Odds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink-0:#0a111e; --ink-1:#101a2c; --ink-2:#16243c; --ink-3:#1d2e49;
  --line:rgba(150,180,220,.10); --line-2:rgba(150,180,220,.18); --line-3:rgba(150,180,220,.30);
  --txt-1:#eef3fb; --txt-2:#9fb0c8; --txt-3:#65748d;
  --floodlight:#56d2ff;
  --qualify:#34d39a; --hfa:#f6b53f; --shield:#d7deea; --spoon:#bd7d4e;
  --draw:#5d6b82;
  --r-sm:6px; --r-md:10px; --r-lg:16px;
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:36px;
  --maxw:1200px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:radial-gradient(1200px 500px at 70% -10%, rgba(86,210,255,.08), transparent 60%), var(--ink-0);
  color:var(--txt-1); font-feature-settings:"tnum" 1; line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:48px}
h1,h2,h3,.disp{font-family:"Archivo",sans-serif;letter-spacing:-.02em}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--s4)}

header{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,rgba(10,17,30,.96),rgba(10,17,30,.84));
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.head-in{display:flex;align-items:center;gap:var(--s4);padding:var(--s3) 0;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:var(--s3);min-width:0}
.beacon{width:30px;height:30px;border-radius:8px;flex:none;background:radial-gradient(circle at 50% 30%,var(--floodlight),#1b6f93 75%);box-shadow:0 0 18px rgba(86,210,255,.45)}
.brand h1{font-size:18px;font-weight:800;line-height:1.1}
.brand .sub{font-size:12px;color:var(--txt-3);font-weight:500}
/* model accuracy vs naive */
.acc{margin-left:auto;display:flex;align-items:center;gap:var(--s4);background:var(--ink-1);
  border:1px solid var(--line-2);border-radius:var(--r-md);padding:8px var(--s3)}
.acc .lab{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--txt-3)}
.acc .stat{display:flex;flex-direction:column;gap:3px}
.acc .bars{display:flex;flex-direction:column;gap:4px;min-width:120px}
.acc .brow{display:flex;align-items:center;gap:7px;font-size:10.5px;color:var(--txt-2)}
.acc .brow .t{width:40px;color:var(--txt-3);font-weight:600}
.acc .track{flex:1;height:6px;border-radius:3px;background:rgba(150,180,220,.10);overflow:hidden}
.acc .track > span{display:block;height:100%;border-radius:3px}
.acc .brow .v{font-family:"Archivo";font-weight:700;color:var(--txt-1);width:42px;text-align:right}
.acc .delta{font-family:"Archivo";font-weight:800;font-size:20px;color:var(--qualify);line-height:1}
.acc .delta small{display:block;font-family:"Inter";font-size:9.5px;font-weight:600;color:var(--txt-3);letter-spacing:.04em}

.seg{display:inline-flex;background:var(--ink-1);border:1px solid var(--line-2);border-radius:999px;padding:3px;margin:var(--s5) 0 var(--s4);gap:2px}
.seg button{font:inherit;font-weight:600;font-size:13.5px;color:var(--txt-2);background:none;border:none;padding:8px 18px;border-radius:999px;cursor:pointer;transition:.15s}
.seg button[aria-selected="true"]{background:var(--ink-3);color:var(--txt-1);box-shadow:inset 0 0 0 1px var(--line-2)}
.seg button:hover:not([aria-selected="true"]){color:var(--txt-1)}
.sec-h{display:flex;align-items:baseline;gap:var(--s3);margin:var(--s5) 0 var(--s3);flex-wrap:wrap}
.sec-h h2{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-2)}
.sec-h .note{font-size:12.5px;color:var(--txt-3)}

/* crest */
.crest{width:26px;height:26px;border-radius:6px;flex:none;display:grid;place-items:center;position:relative;
  font-family:"Archivo";font-weight:700;font-size:9.5px;color:var(--txt-2);background:var(--ink-3);
  border:1px solid var(--line-2);overflow:hidden}
.crest img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:2px;background:transparent}

/* favorites */
.favs{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s3);margin-bottom:var(--s5)}
.fav{background:var(--ink-1);border:1px solid var(--line);border-radius:var(--r-md);padding:var(--s4);position:relative;overflow:hidden}
.fav .lab{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--txt-3);display:flex;align-items:center;gap:6px}
.fav .lab .sq{width:9px;height:9px;border-radius:3px}
.fav .teamrow{display:flex;align-items:center;gap:9px;margin-top:9px}
.fav .team{font-family:"Archivo";font-weight:700;font-size:16px;line-height:1.15}
.fav .pct{font-family:"Archivo";font-weight:800;font-size:26px;margin-top:2px}
.fav.shield .pct{color:var(--shield)} .fav.shield .sq{background:var(--shield)}
.fav.hfa .pct{color:var(--hfa)} .fav.hfa .sq{background:var(--hfa)}
.fav.spoon .pct{color:var(--spoon)} .fav.spoon .sq{background:var(--spoon)}

/* ladders */
.ladders{display:grid;grid-template-columns:1fr 1fr;gap:var(--s4)}
.ladder{background:var(--ink-1);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
.ladder-h{display:flex;align-items:center;justify-content:space-between;padding:var(--s3) var(--s4);border-bottom:1px solid var(--line);background:var(--ink-2)}
.ladder-h .name{font-family:"Archivo";font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.conf-dot{width:8px;height:8px;border-radius:50%}
.east .conf-dot{background:var(--floodlight)} .west .conf-dot{background:#f6894a}
.col-head,.row{display:grid;grid-template-columns:24px minmax(0,1fr) 34px 44px 44px 44px 44px;align-items:center;gap:6px;padding:8px var(--s3)}
.col-head{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--txt-3);border-bottom:1px solid var(--line)}
.col-head .c{text-align:center}
.row{border-bottom:1px solid var(--line);position:relative;transition:background .12s}
.row:last-child{border-bottom:none}
.row:hover{background:var(--ink-2)}
.row.hfa{box-shadow:inset 3px 0 0 var(--hfa)}
.rank{font-family:"Archivo";font-weight:700;font-size:13px;color:var(--txt-3);text-align:center}
.row.hfa .rank{color:var(--hfa)}
.tcell{display:flex;align-items:center;gap:9px;min-width:0}
.tname{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tsub{display:block;font-size:10px;color:var(--txt-3);font-weight:500;white-space:nowrap}
.pts{font-family:"Archivo";font-weight:700;font-size:14px;text-align:center}
.heat{font-family:"Archivo";font-weight:700;font-size:11.5px;text-align:center;padding:5px 0;border-radius:5px;color:var(--txt-1)}
.heat.z{color:var(--txt-3);font-weight:500;background:transparent!important}
.po-line{position:relative;height:0}
.po-line .lab{position:absolute;left:var(--s3);top:-8px;font-size:9px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--qualify);background:var(--ink-1);padding:0 6px}
.po-line::before{content:"";position:absolute;left:0;right:0;top:-1px;height:1px;background:linear-gradient(90deg,transparent,var(--qualify),transparent);box-shadow:0 0 10px rgba(52,211,154,.6)}

/* matches */
.controls{display:flex;gap:var(--s2);align-items:center;flex-wrap:wrap;margin-bottom:var(--s4)}
.dd{position:relative}
.dd-btn{font:inherit;font-weight:600;font-size:13px;color:var(--txt-1);cursor:pointer;background:var(--ink-2);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:9px 12px;display:flex;align-items:center;gap:10px;min-width:190px;justify-content:space-between}
.dd-btn:hover{border-color:var(--line-3)} .dd-btn .car{color:var(--txt-3);font-size:10px}
.dd-menu{position:absolute;top:calc(100% + 6px);left:0;z-index:20;min-width:240px;max-height:340px;overflow:auto;background:var(--ink-2);border:1px solid var(--line-2);border-radius:var(--r-md);padding:5px;box-shadow:0 14px 40px rgba(0,0,0,.5);display:none}
.dd-menu.open{display:block} .dd.open .dd-btn{border-color:var(--floodlight)}
.dd-opt{font-size:13px;padding:8px 10px;border-radius:6px;cursor:pointer;color:var(--txt-2);display:flex;align-items:center;gap:8px}
.dd-opt:hover{background:var(--ink-3);color:var(--txt-1)} .dd-opt[aria-selected="true"]{color:var(--floodlight)}
.seg-mini{display:inline-flex;background:var(--ink-1);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:2px;flex-wrap:wrap}
.seg-mini button{font:inherit;font-size:12px;font-weight:600;color:var(--txt-3);background:none;border:none;padding:6px 11px;border-radius:5px;cursor:pointer}
.seg-mini button[aria-selected="true"]{background:var(--ink-3);color:var(--txt-1)}
.count{font-size:12px;color:var(--txt-3);margin-left:auto}
.daygrp{margin-bottom:var(--s4)}
.dayhead{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--txt-3);padding:var(--s2) 2px;position:sticky;top:60px;background:var(--ink-0);z-index:5}
.game{background:var(--ink-1);border:1px solid var(--line);border-radius:var(--r-md);padding:var(--s3) var(--s4);margin-bottom:var(--s2);transition:.12s}
.game:hover{border-color:var(--line-2);background:var(--ink-2)}
.g-top{display:flex;align-items:center;gap:var(--s3);margin-bottom:10px}
.g-side{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.g-side.away{flex-direction:row-reverse;text-align:right}
.g-side .tn{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-score{font-family:"Archivo";font-weight:800;font-size:18px;flex:none;min-width:54px;text-align:center;letter-spacing:.03em}
.g-score .v{color:var(--txt-3);font-size:13px;font-weight:600;margin:0 3px}
.g-score.upcoming{font-size:11px;font-weight:600;color:var(--txt-3);letter-spacing:.06em;text-transform:uppercase}
.band{display:flex;height:28px;border-radius:6px;overflow:hidden;border:1px solid var(--line);background:var(--ink-0)}
.band > div{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:"Archivo";min-width:0;position:relative;transition:filter .12s}
.band > div span{padding:0 4px;white-space:nowrap;overflow:hidden}
.band > div.fav-seg{box-shadow:inset 0 0 0 2px rgba(255,255,255,.6)}
.band > div.tiny span{display:none}
.res{font-size:10.5px;font-weight:700;padding:3px 7px;border-radius:5px;white-space:nowrap;flex:none}
.res.ok{background:rgba(52,211,154,.14);color:var(--qualify);border:1px solid rgba(52,211,154,.3)}
.res.miss{background:rgba(246,137,74,.13);color:#f6894a;border:1px solid rgba(246,137,74,.3)}
.g-foot{display:flex;align-items:center;gap:var(--s2);margin-top:9px;font-size:11px;color:var(--txt-3)}
.legend-band{display:flex;gap:var(--s4);font-size:11px;color:var(--txt-3);margin:0 2px var(--s3);flex-wrap:wrap}
.legend-band span{display:inline-flex;align-items:center;gap:6px}
.legend-band i{width:10px;height:10px;border-radius:3px;display:inline-block}
footer{color:var(--txt-3);font-size:11.5px;text-align:center;margin-top:var(--s6);padding-top:var(--s4);border-top:1px solid var(--line)}
.hidden{display:none!important}

@media(max-width:860px){
  .ladders,.favs{grid-template-columns:1fr}
  .acc{margin-left:0;width:100%;justify-content:space-between}
  .col-head,.row{grid-template-columns:22px minmax(0,1fr) 30px 40px 40px 40px 40px;gap:4px;padding-left:var(--s3);padding-right:var(--s3)}
  .dayhead{top:56px}
}
@media(max-width:480px){
  .col-head .c-pts,.row .pts{display:none}
  .col-head,.row{grid-template-columns:20px minmax(0,1fr) 38px 38px 38px 38px}
  .g-side .tn{font-size:12.5px}
  .acc .bars{display:none}
}
</style>
</head>
<body>
<header>
  <div class="wrap head-in">
    <div class="brand">
      <div class="beacon"></div>
      <div><h1>MLS Season Model</h1><div class="sub" id="sub"></div></div>
    </div>
    <div class="acc" id="acc"></div>
  </div>
</header>

<main class="wrap">
  <div class="seg" role="tablist" id="seg">
    <button role="tab" aria-selected="true" data-view="outlook">Season Outlook</button>
    <button role="tab" aria-selected="false" data-view="matches">Match Predictions</button>
  </div>

  <section id="view-outlook">
    <div class="favs" id="favs"></div>
    <div class="sec-h"><h2>Conference standings &amp; odds</h2><span class="note" id="laddernote"></span></div>
    <div class="ladders" id="ladders"></div>
  </section>

  <section id="view-matches" class="hidden">
    <div class="sec-h"><h2>Game-by-game predictions</h2><span class="note">Model win / draw / loss probability per match</span></div>
    <div class="controls">
      <div class="dd" id="teamDD">
        <button class="dd-btn" id="teamBtn"><span id="teamSel">All teams</span><span class="car">▼</span></button>
        <div class="dd-menu" id="teamMenu"></div>
      </div>
      <div class="seg-mini" id="resultFilter" role="tablist">
        <button data-f="all" aria-selected="true">All</button>
        <button data-f="upcoming" aria-selected="false">Upcoming</button>
        <button data-f="played" aria-selected="false">Played</button>
        <button data-f="hit" aria-selected="false">Model hit</button>
      </div>
      <span class="count" id="gcount"></span>
    </div>
    <div class="legend-band" id="bandLegend">
      <span><i style="background:var(--draw)"></i>Draw</span>
      <span style="margin-left:auto"><i style="background:var(--qualify)"></i>✓ model's top pick was correct</span>
    </div>
    <div id="gameList"></div>
  </section>
</main>

<footer class="wrap" id="foot"></footer>

<script src="data.js"></script>
<script>
const D = window.MLS_DATA, $=s=>document.querySelector(s), el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const monogram=n=>{const w=n.replace(/[^A-Za-z ]/g,'').split(' ').filter(Boolean);return ((w[0]?.[0]||'')+(w[1]?.[0]||'')).toUpperCase();};
const fmt=v=>`${v.toFixed(1)}%`;                         // percentages with one decimal + sign
const crest=(name,logo)=>`<span class="crest">${monogram(name)}${logo?`<img src="${logo}" alt="" loading="lazy" onerror="this.remove()">`:''}</span>`;
/* visibility-safe team color on dark band */
function hexrgb(h){h=(h||'#888').replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
const lum=([r,g,b])=>(0.2126*r+0.7152*g+0.0722*b)/255;
function vis(hex){let c=hexrgb(hex);if(lum(c)<0.20){c=c.map(x=>Math.round(x+(255-x)*0.5));}return `rgb(${c.join(',')})`;}
const txtOn=hex=>lum(hexrgb(hex))>0.6?'#06121d':'#fff';
/* heatmap background for an odds value */
function heat(v,rgb,maxv){const a=v<=0?0:Math.min(0.62,0.07+0.55*(v/(maxv||100)));return `background:rgba(${rgb.join(',')},${a.toFixed(3)})`;}
const RGB={po:[52,211,154],hfa:[246,181,63],sh:[215,222,234],sp:[189,125,78]};

/* header + accuracy vs naive */
$('#sub').textContent = D.in_season?`${D.season} season · live · ${D.played} played · ${D.upcoming} to play`:`${D.season} season projection`;
(()=>{const m=D.model.best_brier,n=D.model.naive,worst=0.667;             // lower Brier = better
  const wm=(worst-m)/(worst-0.55)*100, wn=(worst-n)/(worst-0.55)*100;
  $('#acc').innerHTML=
    `<div class="stat"><span class="lab">Model accuracy</span>
       <div class="bars">
         <div class="brow"><span class="t">Model</span><span class="track"><span style="width:${wm.toFixed(0)}%;background:var(--qualify)"></span></span><span class="v">${m}</span></div>
         <div class="brow"><span class="t">Naive</span><span class="track"><span style="width:${wn.toFixed(0)}%;background:var(--txt-3)"></span></span><span class="v">${n}</span></div>
       </div></div>
     <div class="delta">+${D.model.improve_pct}%<small>Brier vs naive</small></div>`;
})();
$('#foot').innerHTML=`Capped Dixon-Coles + XGBoost ensemble, availability-weighted · Brier ${D.model.best_brier} vs naive ${D.model.naive} (lower is better → ${D.model.improve_pct}% better) · `+
  `odds from ${D.n_sims.toLocaleString()} Monte-Carlo simulations of the remaining schedule · crests & colors © their clubs (via ESPN) · generated ${D.generated}.`;

/* favorites */
const sBy=k=>[...D.standings].sort((a,b)=>b[k]-a[k])[0];
const fav=(cls,lab,t,k)=>`<div class="fav ${cls}"><div class="lab"><span class="sq"></span>${lab}</div>
  <div class="teamrow">${crest(t.team,t.logo)}<div><div class="team">${t.team}</div><div class="pct">${fmt(t[k])}</div></div></div></div>`;
$('#favs').innerHTML=fav('shield',"Supporters' Shield",sBy('shield'),'shield')+fav('hfa','Top-4 Home Field',sBy('hfa'),'hfa')+fav('spoon','Wooden Spoon',sBy('spoon'),'spoon');
$('#laddernote').textContent=`Top ${D.playoff_slots} per conference make the playoffs · top ${D.hfa_slots} host round one · cells heat-mapped by odds`;

/* ladders with heat-mapped odds */
const MAX={po:Math.max(...D.standings.map(s=>s.playoff),1),hfa:Math.max(...D.standings.map(s=>s.hfa),1),
  sh:Math.max(...D.standings.map(s=>s.shield),1),sp:Math.max(...D.standings.map(s=>s.spoon),1)};
function hcell(v,key){return v<0.05?`<span class="heat z">·</span>`:`<span class="heat" style="${heat(v,RGB[key],MAX[key])}">${v.toFixed(0)}</span>`;}
function ladder(conf){
  const teams=D.standings.filter(s=>s.conf===conf).sort((a,b)=>(b.pts-a.pts)||(b.proj_pts-a.proj_pts));
  const box=el('div','ladder '+conf.toLowerCase());
  box.appendChild(el('div','ladder-h',`<span class="name"><span class="conf-dot"></span>${conf}ern Conference</span>`));
  box.appendChild(el('div','col-head',`<span>#</span><span>Club</span><span class="c c-pts">Pts</span><span class="c">PO</span><span class="c">Host</span><span class="c">Sh</span><span class="c">Sp</span>`));
  teams.forEach((t,i)=>{
    const r=el('div','row'+(i<D.hfa_slots?' hfa':''));
    const sub=(t.gp!=null)?`${t.gp} GP · proj ${t.proj_pts}`:`proj ${t.proj_pts}`;
    r.innerHTML=`<span class="rank">${i+1}</span>`+
      `<span class="tcell">${crest(t.team,t.logo)}<span style="min-width:0"><span class="tname">${t.team}</span><span class="tsub">${sub}</span></span></span>`+
      `<span class="pts">${t.pts!=null?t.pts:t.proj_pts}</span>`+
      hcell(t.playoff,'po')+hcell(t.hfa,'hfa')+hcell(t.shield,'sh')+hcell(t.spoon,'sp');
    box.appendChild(r);
    if(i===D.playoff_slots-1) box.appendChild(el('div','po-line','<span class="lab">Playoff line</span>'));
  });
  return box;
}
$('#ladders').append(ladder('East'),ladder('West'));

/* matches */
const teams=[...new Set(D.games.flatMap(g=>[g.home,g.away]))].sort();
let fTeam='All teams',fRes='all';
const menu=$('#teamMenu');
['All teams',...teams].forEach(t=>{const o=el('div','dd-opt',t);o.setAttribute('role','option');if(t===fTeam)o.setAttribute('aria-selected','true');
  o.onclick=()=>{fTeam=t;$('#teamSel').textContent=t;[...menu.children].forEach(c=>c.setAttribute('aria-selected',c.textContent===t?'true':'false'));closeDD();renderGames();};menu.appendChild(o);});
function closeDD(){$('#teamDD').classList.remove('open');menu.classList.remove('open');}
$('#teamBtn').onclick=e=>{e.stopPropagation();const o=menu.classList.toggle('open');$('#teamDD').classList.toggle('open',o);};
document.addEventListener('click',closeDD);
$('#resultFilter').onclick=e=>{const b=e.target.closest('button');if(!b)return;fRes=b.dataset.f;[...e.currentTarget.children].forEach(c=>c.setAttribute('aria-selected',c===b?'true':'false'));renderGames();};

function band(g){
  const hc=vis(g.hcolor),ac=vis(g.acolor);
  const segs=[['H',g.pH,hc,txtOn(g.hcolor)],['D',g.pD,'var(--draw)','#0a111e'],['A',g.pA,ac,txtOn(g.acolor)]];
  const favk=segs.reduce((m,s)=>s[1]>m[1]?s:m)[0];
  return `<div class="band">`+segs.map(([k,p,bg,fg])=>{const w=p*100;
    return `<div class="${k===favk?'fav-seg':''}${w<13?' tiny':''}" style="width:${w}%;background:${bg};color:${fg}"><span>${w.toFixed(1)}%</span></div>`;}).join('')+`</div>`;
}
function topPick(g){return [['H',g.pH],['D',g.pD],['A',g.pA]].reduce((m,s)=>s[1]>m[1]?s:m)[0];}
function resultBadge(g){if(g.result==null)return'';const ok=topPick(g)===g.result;
  return `<span class="res ${ok?'ok':'miss'}">${ok?'✓':'✗'} ${g.result==='H'?'Home':g.result==='D'?'Draw':'Away'}</span>`;}
function renderGames(){
  let gs=D.games.filter(g=>{if(fTeam!=='All teams'&&g.home!==fTeam&&g.away!==fTeam)return false;
    if(fRes==='played'&&g.result==null)return false; if(fRes==='upcoming'&&g.result!=null)return false;
    if(fRes==='hit'){if(g.result==null)return false;if(topPick(g)!==g.result)return false;} return true;});
  $('#gcount').textContent=`${gs.length} match${gs.length!==1?'es':''}`;
  const list=$('#gameList');list.innerHTML='';let cur=null,grp=null;
  const fmtDay=d=>new Date(d+'T12:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  gs.forEach(g=>{if(g.date!==cur){cur=g.date;grp=el('div','daygrp');grp.appendChild(el('div','dayhead',fmtDay(g.date)));list.appendChild(grp);}
    const played=g.result!=null,card=el('div','game');
    card.innerHTML=`<div class="g-top">`+
      `<div class="g-side home">${crest(g.home,g.hlogo)}<span style="min-width:0"><span class="tn">${g.home}</span></span></div>`+
      (played?`<div class="g-score">${g.hg}<span class="v">–</span>${g.ag}</div>`:`<div class="g-score upcoming">vs</div>`)+
      `<div class="g-side away">${crest(g.away,g.alogo)}<span style="min-width:0"><span class="tn">${g.away}</span></span></div></div>`+
      band(g)+
      `<div class="g-foot"><span>Home ${fmt(g.pH*100)} · Draw ${fmt(g.pD*100)} · Away ${fmt(g.pA*100)}</span>`+
      `<span style="margin-left:auto">${resultBadge(g)}</span></div>`;
    grp.appendChild(card);});
  if(!gs.length)list.innerHTML='<div style="color:var(--txt-3);padding:32px;text-align:center">No matches.</div>';
}
$('#seg').onclick=e=>{const b=e.target.closest('button');if(!b)return;[...e.currentTarget.children].forEach(c=>c.setAttribute('aria-selected',c===b?'true':'false'));
  const v=b.dataset.view;$('#view-outlook').classList.toggle('hidden',v!=='outlook');$('#view-matches').classList.toggle('hidden',v!=='matches');
  if(v==='matches'&&!$('#gameList').children.length)renderGames();};
</script>
</body>
