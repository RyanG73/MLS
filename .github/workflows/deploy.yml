name: Deploy webapp to GitHub Pages

on:
  push:
    branches: [main]
  # Data-refresh workflows commit with the default GITHUB_TOKEN, and GitHub does
  # NOT fire workflows for GITHUB_TOKEN pushes — so those daily/weekly data commits
  # never deployed. Re-run this deploy when a refresh workflow finishes so the
  # freshly-committed payloads actually reach the live site.
  workflow_run:
    workflows: ["Daily In-Season Refresh", "Refresh European League Data", "Weekly Transfermarkt Snapshot"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # Crawlable per-league pages + hub + sitemap (launch plan C2/C7).
      # Generated at deploy time — never committed — so every data-refresh
      # deploy regenerates them for free. stdlib-only: no pip install needed.
      # A failure here MUST fail the deploy: shipping the site without its
      # canonical league pages would orphan every indexed /leagues/ URL.
      - name: Build static league pages + sitemap
        run: python3 scripts/build_static_pages.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: webapp/
      - uses: actions/deploy-pages@v4
        id: deployment
