name: Deploy dashboard to GitHub Pages

# Publishes the static dashboard in webapp/ (index.html + data.js) to GitHub Pages.
# The artifact root is webapp/, so the site is served at the repo root URL:
#   https://ryang73.github.io/mls/
#
# One-time setup required in the repo: Settings -> Pages -> Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-create the Pages site on first run so no manual Settings toggle is needed.
          enablement: true

      - name: Upload webapp/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
