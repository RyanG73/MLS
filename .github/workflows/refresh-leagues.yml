name: Refresh European League Data

on:
  schedule:
    - cron: '0 4 * * 1'   # 04:00 UTC every Monday
  workflow_dispatch:
    inputs:
      league:
        description: 'Single league to rebuild (leave blank for all)'
        required: false
        default: ''

permissions:
  contents: write

# Repo root on the import path so scripts can `import data_pipeline` / `scripts.*`
# (matches the local build_all.sh; prevents ModuleNotFoundError in CI).
env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache football-data parquet files
        uses: actions/cache@v4
        with:
          path: data/football_data/
          key: football-data-${{ hashFiles('scripts/build_*.py', 'data_pipeline/**/*.py') }}
          restore-keys: football-data-

      - name: Build leagues
        run: |
          LEAGUES="${{ github.event.inputs.league }}"
          if [ -z "$LEAGUES" ]; then
            LEAGUES="epl la-liga serie-a bundesliga ligue-1 championship league-one league-two bundesliga-2 serie-b segunda ligue-2 liga-mx eredivisie primeira super-lig scottish-prem greek-super belgian-pro nwsl usl-championship"
          fi
          FAILED=""
          for league in $LEAGUES; do
            echo "── Building $league ──"
            python scripts/build_league_data.py --league "$league" --sims 20000 || {
              echo "WARNING: $league failed, continuing..."
              FAILED="$FAILED $league"
            }
          done
          if [ -n "$FAILED" ]; then
            echo "::warning::Failed leagues:$FAILED"
          fi

      - name: Archive odds snapshot
        run: python scripts/archive_odds_snapshot.py

      - name: Model-odds movers strip
        run: python scripts/build_movers.py

      - name: Per-race deltas (since last build)
        run: python scripts/build_race_deltas.py

      - name: Paper-bet ledger
        run: python scripts/bet_ledger.py

      - name: Edge board
        run: python scripts/build_edge_board.py

      - name: Drift report
        run: python scripts/build_drift_report.py

      - name: Model slice report
        run: python scripts/build_slice_report.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add webapp/data/ data/odds_history.parquet data/match_prob_history.parquet
          git add data/bet_ledger.parquet 2>/dev/null || true
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore(data): weekly European league refresh [$(date -u +%Y-%m-%d)]"
            git push
          )
