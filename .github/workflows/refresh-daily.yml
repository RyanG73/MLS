name: Daily In-Season Refresh

# B11a: every league whose payload status is "live" rebuilds daily (7 AM ET).
# Preseason/completed leagues are skipped — the weekly Monday full rebuild
# (refresh-leagues.yml) is the catch-all that flips them back to live.
on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC = 7:00 AM ET daily
  workflow_dispatch:

permissions:
  contents: write

# Repo root on the import path so scripts can `import data_pipeline` / `scripts.*`
# (the local build_all.sh exports the same; its absence is why the old daily MLS
# job failed for 8+ days with ModuleNotFoundError: No module named 'data_pipeline').
env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      leagues: ${{ steps.set.outputs.leagues }}
    steps:
      - uses: actions/checkout@v4
      - name: List live leagues from payload status
        id: set
        run: |
          LEAGUES=$(python3 - <<'EOF'
          import json, re
          from pathlib import Path
          live = []
          # Cross-league data files carry their own status but are NOT leagues —
          # excluding them stops bogus matrix jobs like "build (edge-board)".
          for p in sorted(Path("webapp/data").glob("*.js")):
              if p.name in ("logos.js", "ledger.js", "power.js", "edge-board.js",
                            "movers.js", "drift.js", "model-slices.js", "coefficients.js"):
                  continue
              m = re.match(r"window\.\w+\s*=\s*(.*?);?\s*$", p.read_text(), re.DOTALL)
              if not m:
                  continue
              try:
                  d = json.loads(m.group(1))
              except Exception:
                  continue
              # Durable guard: any data file that isn't a payload dict (e.g.
              # search-index.js is a JSON array) is not a league — skip rather
              # than crash on .get(). Belt-and-braces with the name list above.
              if not isinstance(d, dict):
                  continue
              if d.get("status") == "live":
                  live.append(p.stem)
          print(json.dumps(live))
          EOF
          )
          echo "leagues=$LEAGUES" >> "$GITHUB_OUTPUT"
          echo "Live leagues: $LEAGUES"

  build:
    needs: detect
    if: ${{ needs.detect.outputs.leagues != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        league: ${{ fromJson(needs.detect.outputs.leagues) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Cache data directory
        uses: actions/cache@v4
        with:
          path: data/
          key: daily-data-${{ matrix.league }}-${{ hashFiles('scripts/build_*.py', 'data_pipeline/**/*.py') }}
          restore-keys: daily-data-${{ matrix.league }}-

      - name: Log Pinnacle openers + closers (MLS only; no-op without ODDS_API_KEY)
        if: matrix.league == 'mls'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python -m data_pipeline.odds_log || echo "openers failed (non-fatal)"
          python -m data_pipeline.odds_log --closers || echo "closers failed (non-fatal)"

      - name: Build league
        run: |
          if [ "${{ matrix.league }}" = "mls" ]; then
            python scripts/build_dashboard_data.py --sims 20000
          else
            python scripts/build_league_data.py --league "${{ matrix.league }}" --sims 20000
          fi

      - name: Upload payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: payload-${{ matrix.league }}
          path: |
            webapp/data/${{ matrix.league }}.js
            data/odds_log.parquet
            data/odds_closers.parquet
          if-no-files-found: warn

  finalize:
    needs: [detect, build]
    if: ${{ always() && needs.detect.outputs.leagues != '[]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Download built payloads
        uses: actions/download-artifact@v4
        with:
          pattern: payload-*
          merge-multiple: true
      - name: Power rankings + odds archive + movers + drift + slices + ledger + edge + weekly + validate
        run: |
          python scripts/build_power_rankings.py
          python scripts/archive_odds_snapshot.py
          python scripts/build_movers.py
          python scripts/build_race_deltas.py
          python scripts/build_drift_report.py
          python scripts/build_slice_report.py
          python scripts/bet_ledger.py
          python scripts/build_edge_board.py
          python scripts/build_weekly_recap.py
          python scripts/validate_payloads.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add webapp/data/ data/odds_history.parquet data/match_prob_history.parquet data/weekly-archive/ data/race_deltas_history.parquet
          git add data/odds_log.parquet data/odds_closers.parquet data/bet_ledger.parquet 2>/dev/null || true
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore(data): daily in-season refresh [$(date -u +%Y-%m-%d)]"
            git push
          )
