name: Refresh MLS Data

on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC = 7:00 AM ET daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache data directory
        uses: actions/cache@v4
        with:
          path: data/
          key: mls-data-cache-${{ hashFiles('scripts/build_*.py', 'data_pipeline/**/*.py') }}
          restore-keys: mls-data-cache-

      - name: Log Pinnacle openers + closers (no-op without ODDS_API_KEY)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python -m data_pipeline.odds_log || echo "openers failed (non-fatal)"
          python -m data_pipeline.odds_log --closers || echo "closers failed (non-fatal)"

      - name: Build MLS dashboard data
        run: python scripts/build_dashboard_data.py --sims 20000

      - name: Build power rankings
        run: python scripts/build_power_rankings.py

      - name: Archive odds snapshot
        run: python scripts/archive_odds_snapshot.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add webapp/data/ data/odds_history.parquet
          git add data/odds_log.parquet data/odds_closers.parquet 2>/dev/null || true
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore(data): refresh MLS + power rankings [$(date -u +%Y-%m-%d)]"
            git push
          )
