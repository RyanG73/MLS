# Transfermarkt team-name → ASA team_id mapping for MLS.
#
# Used by scripts/import_transfermarkt.py to join worldfootballR's TM squad-value
# scrape onto the ASA-team-id'd match data in scripts/eval_baseline.py.
#
# Values MUST be the short-code team IDs used in eval_baseline.py / asa_client.py
# (ATL, ATX, CLT, …) — not the internal ASA hex IDs.
#
# Transfermarkt names occasionally drift (e.g. capitalisation, punctuation,
# or full vs short name). Include each variant you see — the
# `_unmapped` warning in import_transfermarkt.py will surface anything missed.

transfermarkt:
  # Atlanta United
  "Atlanta United FC": "ATL"
  "Atlanta United": "ATL"

  # Austin FC
  "Austin FC": "ATX"

  # CF Montréal
  "CF Montréal": "MTL"
  "CF Montreal": "MTL"
  "Montreal Impact": "MTL"

  # Charlotte FC
  "Charlotte FC": "CLT"

  # Chicago Fire
  "Chicago Fire FC": "CHI"
  "Chicago Fire": "CHI"

  # Colorado Rapids
  "Colorado Rapids": "COL"

  # Columbus Crew
